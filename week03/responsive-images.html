<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDD 131 | Responsive Images | Diego</title>
    <meta name="author" content="Diego Esquit">
    <meta name="description" content="WDD 131 | Responsive Images |
    Diego: Web site to practice resposive images principles">
    <link rel="stylesheet" href="styles/responsive-images.css">
</head>
<body>
    <main>
        <div class="hero">
            <picture>
                <source srcset="images/hero-images/hero-large.webp" media="(min-width: 1000px)">
                <source srcset="images/hero-images/hero-medium.webp" media="(min-width: 500px)">
                <img src="images/hero-images/hero-small.webp" alt="Picture of the Bahia Blanca, Argentina Temple from The Church of Jesus Christ LDS." width="500" height="250">
            </picture>
        </div>
    </main>
</body>
